# OTel Collector 配置：业务上报 → Collector → Jaeger + Prometheus
# 业务代码只需上报到 otel-collector:4317，下游路由由 Collector 决定
#
# dev 默认全采样（100%），保证联调时 Jaeger 能看到所有 span；
# prod 部署时把 tail_sampling 接回来（errors/slow 全留，正常 1%）。

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  # dev 全采样；prod 改成 errors/slow 全留 + 1% 兜底。
  tail_sampling:
    decision_wait: 10s
    policies:
      - name: keep-all
        type: probabilistic
        probabilistic: { sampling_percentage: 100 }

exporters:
  # 链路 → Jaeger
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # 指标 → Prometheus（pull 模式）
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [tail_sampling, batch]
      exporters: [otlp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]

