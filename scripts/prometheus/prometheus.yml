global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: apihub-dev
    env: dev

scrape_configs:
  # 业务服务（自动发现）
  - job_name: apihub-services
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        filters:
          - name: name
            values: ["apihub-.*"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/(apihub-.*)'
        target_label: container
      # Prometheus 端口约定：业务 Pod 暴露 9090
      - source_labels: [__address__]
        target_label: __metrics_path__
        replacement: /metrics

  # OTel Collector 自身指标
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # 基础设施
  - job_name: kafka
    static_configs:
      - targets: ["kafka:9092"]
        # 实际 prod 用 kafka_exporter，dev 简化
