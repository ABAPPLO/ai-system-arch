# GitLab CI 模板 —— 声明式接口接入 api-registry
#
# 用法（业务仓库的 .gitlab-ci.yml）：
#   include:
#     - project: 'platform/apihub-templates'
#       file: '/templates/ci/gitlab-ci.apihub.yml'
#       ref: main
#
#   variables:
#     APIHUB_REGISTRY_URL: "http://api-registry.apihub-system.svc.cluster.local:8000"
#     APIHUB_API_KEY: $CI_APIHUB_API_KEY  # 从 GitLab Variable 注入
#     APIHUB_ENV: "dev"                   # default dev；staging/prod 走单独 stage
#
# 触发：schema/ 下 yaml 变更 + main 分支合并
# 行为：
#   - lint-schema    语法 + 字段校验
#   - apply-dev      合并到 main → 推到 dev 环境（自助，自动 approved）
#   - apply-staging  打 staging tag 时手动触发 → 推到 staging
#   - apply-prod     打 prod tag 时手动触发 → 推到 prod（待审批）

stages:
  - lint
  - apply-dev
  - apply-staging
  - apply-prod

.apihub_base:
  image: registry.apihub.internal/apihub/apihub-cli:0.1.0
  variables:
    APIHUB_REGISTRY_URL: "http://api-registry.apihub-system.svc.cluster.local:8000"
    APIHUB_ENV: "dev"
  before_script:
    - test -n "$APIHUB_API_KEY" || (echo "APIHUB_API_KEY not set" && exit 1)
    - test -d schema/ || (echo "schema/ directory not found" && exit 1)

lint-schema:
  stage: lint
  image: python:3.13-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - pip install --quiet pyyaml
    - python scripts/validate-schema.py

apply-dev:
  stage: apply-dev
  extends: .apihub_base
  variables:
    APIHUB_ENV: "dev"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: [ "schema/**/*" ]
  script:
    - apihub-apply schema/
      --base-url "$APIHUB_REGISTRY_URL"
      --api-key "$APIHUB_API_KEY"
      --env dev
      --submitted-by "gitlab:$CI_COMMIT_USER_ID"

apply-staging:
  stage: apply-staging
  extends: .apihub_base
  variables:
    APIHUB_ENV: "staging"
  rules:
    - if: $CI_COMMIT_TAG =~ /^staging-/
      when: manual
  script:
    - apihub-apply schema/
      --base-url "$APIHUB_REGISTRY_URL"
      --api-key "$APIHUB_API_KEY"
      --env staging
      --submitted-by "gitlab:$CI_COMMIT_USER_ID"

apply-prod:
  stage: apply-prod
  extends: .apihub_base
  variables:
    APIHUB_ENV: "prod"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual
  script:
    - apihub-apply schema/
      --base-url "$APIHUB_REGISTRY_URL"
      --api-key "$APIHUB_API_KEY"
      --env prod
      --submitted-by "gitlab:$CI_COMMIT_USER_ID"
