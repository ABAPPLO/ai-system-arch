name: Docker Build & Push

# 仅 main 分支和 tag 触发，PR 不构建（PR 走 lint/manifests）
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "services/**"
      - ".github/workflows/docker.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-services:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.list.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: list
        run: |
          BASE="HEAD^"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            BASE="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo HEAD~10)"
          fi
          SERVICES=$(ls services/services/ 2>/dev/null | jq -R . | jq -sc .)
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.service }}
    needs: detect-services
    if: ${{ needs.detect-services.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        run: |
          REPO="ghcr.io/${{ github.repository_owner }}/apihub-${{ matrix.service }}"
          REPO_LC=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          TAGS=""
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            V="${GITHUB_REF#refs/tags/}"
            TAGS="-t ${REPO_LC}:${V} -t ${REPO_LC}:latest"
          else
            SHA="${GITHUB_SHA::7}"
            TAGS="-t ${REPO_LC}:${SHA} -t ${REPO_LC}:main"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "image=${REPO_LC}" >> $GITHUB_OUTPUT

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: false

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image }}:main
          severity: CRITICAL,HIGH
          exit-code: "0"   # 先告警不阻断，后续收紧
