name: Manifests

on:
  pull_request:
    paths:
      - "deploy/**"
      - ".github/workflows/manifests.yml"
  push:
    branches: [main]
    paths:
      - "deploy/**"

permissions:
  contents: read

concurrency:
  group: manifests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.*"
          cli_config_credentials_token: ${{ secrets.TF_CLOUD_TOKEN || '' }}

      - name: terraform fmt
        working-directory: deploy/terraform
        run: terraform fmt -recursive -check -diff

      - name: terraform init (dev)
        working-directory: deploy/terraform/envs/dev
        run: terraform init -backend=false

      - name: terraform validate (dev)
        working-directory: deploy/terraform/envs/dev
        run: terraform validate

  kustomize:
    name: Kustomize build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sSL -o /tmp/kustomize.tgz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tgz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/

      - name: Build ${{ matrix.env }}
        # --load-restrictor LoadRestrictionsNone：overlays 引用 ../../base 与 ../../services
        # （标准 base/+overlays 多环境布局，资源位于 overlay 子树之外）。kustomize 默认安全策略
        # 禁止向上穿越子树，必须放开 restriction 才能构建——这是 kustomize 多环境布局的官方推荐用法，
        # 非恶意外部引用，故在此显式放开。
        run: kustomize build deploy/k8s/overlays/${{ matrix.env }} --load-restrictor LoadRestrictionsNone > /tmp/manifests-${{ matrix.env }}.yaml

      - name: Validate YAML syntax
        run: python3 -c "import yaml; list(yaml.safe_load_all(open('/tmp/manifests-${{ matrix.env }}.yaml')))"

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: manifests-${{ matrix.env }}
          path: /tmp/manifests-${{ matrix.env }}.yaml

  kubeconform:
    name: Kubeconform schema check
    runs-on: ubuntu-latest
    needs: kustomize
    strategy:
      matrix:
        env: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize + kubeconform
        run: |
          curl -sSL -o /tmp/kustomize.tgz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tgz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/
          wget -q https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Build + check
        run: |
          # 同 kustomize job：base/ 在 overlay 子树之外，需 LoadRestrictionsNone（标准多环境布局）
          kustomize build deploy/k8s/overlays/${{ matrix.env }} --load-restrictor LoadRestrictionsNone \
            | kubeconform -strict -ignore-missing-schemas -summary
