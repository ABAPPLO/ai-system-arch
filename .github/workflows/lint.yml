name: Lint

on:
  pull_request:
    paths:
      - "services/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"
  push:
    branches: [main]
    paths:
      - "services/**"

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Ruff (lint + format check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install "ruff==0.15.*"

      - name: Ruff check
        run: ruff check services/ scripts/

      - name: Ruff format check
        run: ruff format --check services/ scripts/

  mypy:
    name: Mypy (type check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install mypy + project deps
        run: |
          pip install "mypy==2.2.*"
          pip install types-PyYAML
          # 装项目依赖让 mypy 解析 import —— 缺依赖会让 type:ignore 误判 unused（与本地不一致）
          pip install -e services/libs/apihub-core

      - name: Mypy
        run: mypy services/
