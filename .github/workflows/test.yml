name: Test

on:
  pull_request:
    paths:
      - "services/**"
      - "tests/**"
      - ".github/workflows/test.yml"
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:

  unit:
    name: Unit tests (no infra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/libs/apihub-core/pyproject.toml

      - name: Install apihub-core + test deps
        run: |
          pip install --upgrade pip
          pip install -e services/libs/apihub-core[test]

      - name: Run unit tests
        run: pytest services/libs/apihub-core/tests -v -m "not integration" --tb=short

      - name: Coverage report
        run: |
          pytest services/libs/apihub-core/tests -m "not integration" \
            --cov=apihub_core --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.xml

  integration:
    name: Integration tests (PG service container)
    runs-on: ubuntu-latest

    # 用 GitHub Actions service container 起一个真 PG
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: apihub
          POSTGRES_USER: apihub
          POSTGRES_PASSWORD: apihub_dev_pwd
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U apihub"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20

    env:
      TEST_PG_DSN: postgresql://apihub:apihub_dev_pwd@localhost:5432/apihub

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/libs/apihub-core/pyproject.toml

      - name: Install apihub-core + psql
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          pip install --upgrade pip
          pip install -e services/libs/apihub-core[test]

      - name: Wait for PG
        run: |
          for i in {1..30}; do
            if PGPASSWORD=apihub_dev_pwd psql -h localhost -U apihub -d apihub -c "SELECT 1" >/dev/null 2>&1; then
              echo "PG ready"; exit 0
            fi
            sleep 1
          done
          echo "PG not ready"; exit 1

      - name: Load schema + seed
        run: |
          PGPASSWORD=apihub_dev_pwd psql -h localhost -U apihub -d apihub \
            -f scripts/init-db/01-schema.sql
          PGPASSWORD=apihub_dev_pwd psql -h localhost -U apihub -d apihub \
            -f scripts/init-db/02-seed.sql

      - name: Run integration tests
        run: pytest services/libs/apihub-core/tests -v -m integration --tb=short
