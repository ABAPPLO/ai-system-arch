# APIHub Admin —— 生产 nginx 配置
#
# 部署形态：
#   - 静态资源（dist/）由 nginx 直接 serve
#   - /api/* 反代到集群内服务（K8s ClusterIP / 内网 SLB）
#   - SPA fallback：所有未匹配路由返回 index.html
#
# 配套 K8s manifest（Phase 3）：deploy/k8s/services/admin-frontend/{deployment,service,ingress}.yaml
# 镜像构建：把 dist/ 拷进 nginx:1.27-alpine 镜像

server {
    listen       80;
    server_name  _;

    # 安全头（生产必开）
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # gzip（文本类资源必开）
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm image/svg+xml;
    gzip_vary on;

    # 静态资源（带 hash 的，1 年强缓存）
    location /assets/ {
        root   /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html 不缓存（每次都拿最新的入口，确保 JS hash 更新生效）
    location = /index.html {
        root   /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # SPA fallback
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # ============ API 反代 ============
    # 注意：生产里 admin 前端不直接调各服务，而是统一走 admin-bff（聚合 + 鉴权 + 审计）。
    # 这里保留 /api/registry 和 /api/retry 的直连，因为 Phase 2 admin-bff 还没代理这两类。
    # Phase 3 改为：所有 /api/* 都进 admin-bff，由它分发。

    location /api/admin/ {
        proxy_pass http://admin-bff.apihub.svc.cluster.local:8006/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_buffering off;          # SSE / 流式响应
    }

    location /api/registry/ {
        proxy_pass http://api-registry.apihub.svc.cluster.local:8000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/retry/ {
        proxy_pass http://retry-svc.apihub.svc.cluster.local:8009/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/trace/ {
        proxy_pass http://trace-svc.apihub.svc.cluster.local:8008/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查（K8s liveness/readiness probe 用）
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
