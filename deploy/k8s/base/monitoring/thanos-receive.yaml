apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanos-receive
  namespace: apihub-monitoring
spec:
  replicas: 3
  selector:
    matchLabels:
      app: thanos-receive
  template:
    metadata:
      labels:
        app: thanos-receive
    spec:
      containers:
        - name: thanos
          image: quay.io/thanos/thanos:v0.35.0
          args:
            - "receive"
            - "--grpc-address=0.0.0.0:10901"
            - "--http-address=0.0.0.0:10902"
            - "--remote-write.address=0.0.0.0:19291"
            - "--tsdb.path=/data"
            - "--label=region=\"global\""
          ports:
            - containerPort: 10901
            - containerPort: 10902
            - containerPort: 19291
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: thanos-receive
  namespace: apihub-monitoring
spec:
  selector:
    app: thanos-receive
  ports:
    - name: grpc
      port: 10901
    - name: http
      port: 10902
    - name: remote-write
      port: 19291
