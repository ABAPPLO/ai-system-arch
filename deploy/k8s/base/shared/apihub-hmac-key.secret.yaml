apiVersion: v1
kind: Secret
metadata:
  name: apihub-hmac-key
  namespace: apihub-system
type: Opaque
stringData:
  # R2e HMAC envelope key（AES-256-GCM，32 字节 hex = 64 hex 字符）。
  # auth/dispatcher/notification 共享同一 key（同一加密域——auth 加密存的 secret 须被
  # dispatcher/notification 解密）。占位值；各 overlay 必须 patch 成真实 key：
  #   dev/kind：用 .env.dev 的 HMAC_SECRET_KEY（dev hex，非生产密钥）；
  #   staging/prod：运维通过 sealed-secrets/external-secrets 注入，三服务必须同值。
  hmac_secret_key: "REPLACE_BY_OVERLAY"
