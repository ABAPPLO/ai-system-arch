# MM2 (MirrorMaker 2) k8s Deployment —— R3b S3-T1。
#
# 替换坏掉的 MM1 docker 脚本（scripts/multi-region/deploy-mirrormaker.sh.legacy）。
# - 原生双向 sh<->bj（IdentityReplicationPolicy 防 topic 改名回环）
# - allowlist 5 个双向 topic：api-call-events / task-requests / task-failures / audit-events / billing-events
# - sed-entrypoint：MM2 properties 文件不支持原生 ${ENV} 替换（Java properties，无 shell expansion），
#   故 ConfigMap 用 __KAFKA_SH__ / __KAFKA_BJ__ 占位符，Deployment 启动时 sed 注入实际值。
#   （bitnami/kafka:3.7 镜像含 sed，无需 envsubst/gettext。）
# - broker 地址来自 shared-infra ConfigMap（KAFKA_SH / KAFKA_BJ keys，S3-T2 在 prod/prod-bj/kind overlay 注入）。
#
# 注意：本 manifest 用 bitnami/kafka:3.7（spec 指定）。本地镜像差异 / 真 pull 在 S3-T4 live e2e 解决。
apiVersion: v1
kind: ConfigMap
metadata:
  name: mm2-config
  namespace: apihub-system
  labels:
    app.kubernetes.io/name: mirrormaker2
    app.kubernetes.io/component: kafka-mirror
data:
  mm2.properties: |
    clusters = sh, bj
    sh.bootstrap.servers = __KAFKA_SH__
    bj.bootstrap.servers = __KAFKA_BJ__
    replication.policy.class = org.apache.kafka.connect.mirror.IdentityReplicationPolicy
    replication.policy.separator = .
    sync.topic.acls.enabled = false
    emit.heartbeats.enabled = true
    sh->bj.enabled = true
    sh->bj.topics = api-call-events|task-requests|task-failures|audit-events|billing-events
    bj->sh.enabled = true
    bj->sh.topics = api-call-events|task-requests|task-failures|audit-events|billing-events
    sync.group.offsets.enabled = true
    emit.checkpoints.enabled = true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mirrormaker2
  namespace: apihub-system
  labels:
    app.kubernetes.io/name: mirrormaker2
    app.kubernetes.io/component: kafka-mirror
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mirrormaker2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mirrormaker2
        app.kubernetes.io/component: kafka-mirror
    spec:
      containers:
        - name: mm2
          image: bitnami/kafka:3.7
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              sed -e "s/__KAFKA_SH__/$KAFKA_SH/" -e "s/__KAFKA_BJ__/$KAFKA_BJ/" /etc/mm2/mm2.properties > /tmp/mm2.properties
              exec /opt/bitnami/kafka/bin/connect-mirror-maker.sh /tmp/mm2.properties
          env:
            - name: KAFKA_SH
              valueFrom:
                configMapKeyRef:
                  name: apihub-shared-infra
                  key: KAFKA_SH
            - name: KAFKA_BJ
              valueFrom:
                configMapKeyRef:
                  name: apihub-shared-infra
                  key: KAFKA_BJ
          volumeMounts:
            - name: mm2-config
              mountPath: /etc/mm2
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: mm2-config
          configMap:
            name: mm2-config
