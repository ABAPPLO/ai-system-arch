# staging CPU-based HPA。Kafka-lag（retry/executor）需 KEDA，non-goal。
# dispatcher 是 Rollout（非 Deployment），scaleTargetRef.kind=Rollout。
# staging min/max 低于 prod（dispatcher 2/6，executor 2/6，quota 2/8，retry 1/4，auth 1/4）。
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dispatcher
  namespace: apihub-system
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: dispatcher
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: executor
  namespace: apihub-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: executor
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quota
  namespace: apihub-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quota
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: retry
  namespace: apihub-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: retry
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth
  namespace: apihub-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
