apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apihub-system

resources:
  - ../../base/namespaces/namespaces.yaml
  - ../../base/shared/argo-rollouts/analysis-templates.yaml
  - ../../services/api-registry/configmap.yaml
  - ../../services/api-registry/deployment.yaml
  # dispatcher 走 Argo Rollouts canary（详见 docs/05-core-flows.md §8）
  - ../../services/dispatcher/configmap.yaml
  - ../../services/dispatcher/rollout.yaml
  - ../../services/auth/configmap.yaml
  - ../../services/auth/deployment.yaml
  - ../../services/executor/configmap.yaml
  - ../../services/executor/deployment.yaml
  - ../../services/quota/configmap.yaml
  - ../../services/quota/deployment.yaml
  - ../../services/tenant/configmap.yaml
  - ../../services/tenant/deployment.yaml
  - ../../services/admin/configmap.yaml
  - ../../services/admin/deployment.yaml
  - ../../services/docs/configmap.yaml
  - ../../services/docs/deployment.yaml
  - ../../services/trace/configmap.yaml
  - ../../services/trace/deployment.yaml
  - ../../services/retry/configmap.yaml
  - ../../services/retry/deployment.yaml
  - ../../services/workflow/configmap.yaml
  - ../../services/workflow/deployment.yaml

patches:
  - target:
      kind: Deployment
      name: api-registry
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Rollout
      name: dispatcher
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: auth
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: executor
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: quota
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 4
  - target:
      kind: Deployment
      name: tenant
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: admin
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: docs
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: trace
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: retry
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: workflow
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
