apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apihub-system

resources:
  - ../../base/namespaces/namespaces.yaml
  - ../../services/api-registry/configmap.yaml
  - ../../services/api-registry/deployment.yaml

patches:
  - target:
      kind: Deployment
      name: api-registry
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
