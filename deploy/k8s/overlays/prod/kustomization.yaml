apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 不设全局 namespace：base 资源（Deployment/ConfigMap）已在 metadata.namespace 显式声明
# apihub-system；全局 namespace transformer 会把 namespaces.yaml 里多个 Namespace
# （apihub-data/apihub-ingress/...）的 metadata.name 全改成 apihub-system → ID 冲突。
# （与 overlays/kind 写法一致）

resources:
  - ../../base/namespaces/namespaces.yaml
  - ../../base/shared/argo-rollouts/analysis-templates.yaml
  - ../../services/api-registry/configmap.yaml
  - ../../services/api-registry/deployment.yaml
  # dispatcher 走 Argo Rollouts canary（详见 docs/05-core-flows.md §8）
  - ../../services/dispatcher/configmap.yaml
  - ../../services/dispatcher/rollout.yaml
  - ../../services/auth/configmap.yaml
  - ../../services/auth/deployment.yaml
  - ../../services/executor/configmap.yaml
  - ../../services/executor/deployment.yaml
  - ../../services/quota/configmap.yaml
  - ../../services/quota/deployment.yaml
  - ../../services/tenant/configmap.yaml
  - ../../services/tenant/deployment.yaml
  - ../../services/admin/configmap.yaml
  - ../../services/admin/deployment.yaml
  - ../../services/docs/configmap.yaml
  - ../../services/docs/deployment.yaml
  - ../../services/trace/configmap.yaml
  - ../../services/trace/deployment.yaml
  - ../../services/retry/configmap.yaml
  - ../../services/retry/deployment.yaml
  - ../../services/workflow/configmap.yaml
  - ../../services/workflow/deployment.yaml

patches:
  - target:
      kind: Deployment
      name: api-registry
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 5
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 4000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 4Gi
  - target:
      kind: Rollout
      name: dispatcher
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 8
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 4000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 4Gi
  - target:
      kind: Deployment
      name: auth
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 2000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi
  - target:
      kind: Deployment
      name: executor
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 10
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 4000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 4Gi
  - target:
      kind: Deployment
      name: quota
    patch: |-
      # docs/03 §3.6: 5-15 副本；quota 延迟最敏感，prod 给到 8 + 高 CPU 上限
      - op: replace
        path: /spec/replicas
        value: 8
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 2000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi
  - target:
      kind: Deployment
      name: tenant
    patch: |-
      # docs/03 §3.14: 3-5 副本
      - op: replace
        path: /spec/replicas
        value: 5
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
  - target:
      kind: Deployment
      name: admin
    patch: |-
      # docs/03 §3.14: 管理类 3-5 副本
      - op: replace
        path: /spec/replicas
        value: 5
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
  - target:
      kind: Deployment
      name: docs
    patch: |-
      # docs 只读，3 副本足够（无状态、可水平扩展）
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
  - target:
      kind: Deployment
      name: trace
    patch: |-
      # trace 只读 CH，3 副本足够（聚合查询偶发并发）
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
  - target:
      kind: Deployment
      name: retry
    patch: |-
      # retry 后台 worker（Kafka 消费 + ZSet 轮询），3-10 副本（HPA based on Kafka lag）
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
  - target:
      kind: Deployment
      name: workflow
    patch: |-
      # workflow-svc 本身轻量（Argo 撑计算）；3 副本足够 admin UI + 日志流
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi

# prod 走 Rollout（Argo Rollouts canary），见 docs/09-deployment.md §6.3
