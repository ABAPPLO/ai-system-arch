apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apihub-system

resources:
  - ../../base/namespaces/namespaces.yaml
  - ../../services/api-registry/configmap.yaml
  - ../../services/api-registry/deployment.yaml
  - ../../services/dispatcher/configmap.yaml
  - ../../services/dispatcher/deployment.yaml
  - ../../services/auth/configmap.yaml
  - ../../services/auth/deployment.yaml
  - ../../services/executor/configmap.yaml
  - ../../services/executor/deployment.yaml
  - ../../services/quota/configmap.yaml
  - ../../services/quota/deployment.yaml
  - ../../services/tenant/configmap.yaml
  - ../../services/tenant/deployment.yaml

patches:
  - target:
      kind: Deployment
      name: api-registry
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 5
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 4000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 4Gi
  - target:
      kind: Deployment
      name: dispatcher
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 8
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 4000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 4Gi
  - target:
      kind: Deployment
      name: auth
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 2000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi
  - target:
      kind: Deployment
      name: executor
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 10
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 4000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 4Gi
  - target:
      kind: Deployment
      name: quota
    patch: |-
      # docs/03 §3.6: 5-15 副本；quota 延迟最敏感，prod 给到 8 + 高 CPU 上限
      - op: replace
        path: /spec/replicas
        value: 8
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 2000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi
  - target:
      kind: Deployment
      name: tenant
    patch: |-
      # docs/03 §3.14: 3-5 副本
      - op: replace
        path: /spec/replicas
        value: 5
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi

# prod 走 Rollout（Argo Rollouts canary），见 docs/09-deployment.md §6.3
