apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-backend
  namespace: apihub-system
  annotations:
    argocd-gitops-verify: "true"
spec:
  replicas: 1
  selector: { matchLabels: { app: mock-backend } }
  template:
    metadata: { labels: { app: mock-backend } }
    spec:
      containers:
        - name: echo
          image: python:3.11-slim
          command: ["python3", "-c"]
          args:
            - |
              from http.server import BaseHTTPRequestHandler, HTTPServer
              import json
              class H(BaseHTTPRequestHandler):
                  def do_POST(self):
                      n=int(self.headers.get('Content-Length',0)); b=self.rfile.read(n)
                      self.send_response(200); self.send_header('Content-Type','application/json'); self.end_headers()
                      self.wfile.write(json.dumps({"ok":True,"echo":b.decode()[:200]}).encode())
                  def do_GET(self):
                      self.send_response(200); self.end_headers(); self.wfile.write(b'{"ok":true}')
                  def log_message(self,*a): pass
              HTTPServer(('0.0.0.0',8080),H).serve_forever()
          ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata:
  name: mock-backend
  namespace: apihub-system
spec:
  selector: { app: mock-backend }
  ports: [{ name: http, port: 80, targetPort: 8080 }]
