# apihub-shared-infra：kind overlay 的数据层连接配置（GitOps 友好版）。
#
# host 字段用 host.docker.internal（一个稳定、git 可表达的名称），而非 __HOST_IP__ 占位符——
# 后者需要 apply.sh 在 apply 时 sed 注入真实 docker-bridge IP，但 ArgoCD selfHeal 会把 git
# 原文（含占位符）原样同步进 live ConfigMap，任何 pod reload 都连不上 host compose 的 PG/Redis。
# kind-on-Linux 的 pod 并不继承 node 的 /etc/hosts，host.docker.internal 在 kind pod 里默认
# 不可解析（socket.gaierror）→ 由 scripts/k8s/patch-coredns-hosts.sh 在运行时往 kube-system
# 的 CoreDNS Corefile 注入一个 hosts 块（host.docker.internal → docker-bridge IP）来集群范围解析。
# CoreDNS 不在本 overlay 目录下 → 不被 ArgoCD Application（path=overlays/kind）管理 → selfHeal
# 不会回滚该运行时注入。
#
# 端口 = 运行时值（非 git 真相）：host 5432/6379/9000 被占时 compose 经 pick_host_port 重映射到
# 高位端口（15433/16380/29000...），git 写死的 5432/6379 与运行时不一致 → ArgoCD selfHeal 会把
# live CM 回滚成 git 端口、pod reload 连不上。解法：本 CM 标 Compare=false → ArgoCD 完全跳过其
# compare/sync/prune（变成 apply.sh 托管）；apply.sh 在 apply 后 read-back compose 实际 publish
# 端口并 patch 进 live CM。端口此处保留标准值（5432/6379/8123/4317/9094）作 apply.sh 模板。
# host（host.docker.internal，稳定名称）+ CoreDNS（运行时解析）走「git 真相+运行时解析」；
# port 走「运行时注入+Compare=false」—— 二者分离，闭环不回滚。
apiVersion: v1
kind: ConfigMap
metadata:
  name: apihub-shared-infra
  namespace: apihub-system
  annotations:
    # ArgoCD 跳过本 CM 的 compare/sync/prune：端口由 apply.sh 运行时 patch（read-back compose
    # 实际 publish 端口）。不标则 selfHeal 会把 live CM 的 PG_PORT/REDIS_PORT 回滚成 git 的 5432/6379。
    argocd.argoproj.io/sync-options: Compare=false
data:
  PG_HOST: "host.docker.internal"
  PG_PORT: "5432"
  PG_USER: "apihub_app"
  PG_DATABASE: "apihub"
  PG_SSL: "disable"
  # kind 单节点：11 服务 × 4 worker × pool(min 10) 在启动瞬间打爆 docker-proxy 的连接 backlog
  # → ConnectionRefused 风暴。dev/kind 缩小连接池（envFrom 顺序在后，覆盖各服务 configmap 的 10/50）。
  PG_POOL_MIN: "2"
  PG_POOL_MAX: "10"
  REDIS_HOST: "host.docker.internal"
  REDIS_PORT: "6379"
  KAFKA_BROKERS: "host.docker.internal:9094"
  CH_HOST: "host.docker.internal"
  CH_PORT: "8123"
  CH_USERNAME: "apihub"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4317"
  # retry→executor 内部重试跳：executor Service 只暴露 80（targetPort http/8000），
  # 而 retry worker 默认模板带 {port}=8003 → ClusterIP:8003 无 DNAT、SYN 被 drop →
  # 每次 attempt 耗满 30s executor_timeout（Task 8 smoke 的 L3 concern）。
  # 此模板去掉 {port} 占位符 → worker.py 的 .format(port=...) 成为 no-op →
  # 走 http://executor.apihub-system/v1/internal/retry（命中 Service:80）。
  EXECUTOR_SERVICE_TEMPLATE: "http://executor.apihub-system/v1/internal/retry"
  ENV: "dev"
---
apiVersion: v1
kind: Secret
metadata:
  name: apihub-shared-secret
  namespace: apihub-system
type: Opaque
stringData:
  # PG_PASSWORD 用业务账号 apihub_app 的密码（非 superuser apihub 的密码）。
  # 见 scripts/init-db/00-roles.sql:29；.env.dev:PG_PASSWORD。
  PG_PASSWORD: "apihub_app_dev_pwd"
  REDIS_PASSWORD: "apihub_dev_pwd"
  CH_PASSWORD: "apihub_dev_pwd"
