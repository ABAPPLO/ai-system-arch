# kind/dev：注入 ai-gateway 自己的 provider-key 加密密钥。
#
# base 的 ai-gateway-secret 是空壳（生产由 external-secrets 注入），dev/kind 必须显式
# 提供 AI_GATEWAY_ENCRYPTION_KEY，否则 ai_gateway/crypto.py::_get_key 抛 RuntimeError →
# /v1/chat/completions 500。值与 apihub_core.config.pii_encryption_key 默认（dev hex）
# 同款：64 hex = 32 字节 AES-256 key（非生产密钥，仅 kind/dev）。
#
# 该 patch 用 strategic-merge（非 JSON6902）：Secret 的 stringData 字段可被 SM 直接合并。
apiVersion: v1
kind: Secret
metadata:
  name: ai-gateway-secret
  namespace: apihub-system
type: Opaque
stringData:
  AI_GATEWAY_ENCRYPTION_KEY: "deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef"
