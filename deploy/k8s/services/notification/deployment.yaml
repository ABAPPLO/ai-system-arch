apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: apihub-system
  labels:
    app.kubernetes.io/name: notification
    app.kubernetes.io/part-of: apihub
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: notification
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification
    spec:
      containers:
        - name: app
          image: registry.apihub.internal/apihub/notification:0.1.0-dev
          ports:
            - name: http
              containerPort: 8012
          envFrom:
            - configMapRef:
                name: notification-config
          startupProbe:
            httpGet: { path: /health/ready, port: http }
            periodSeconds: 5
            failureThreshold: 24
---
apiVersion: v1
kind: Service
metadata:
  name: notification
  namespace: apihub-system
spec:
  selector:
    app.kubernetes.io/name: notification
  ports:
    - name: http
      port: 80
      targetPort: http
