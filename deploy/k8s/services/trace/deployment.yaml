apiVersion: apps/v1
kind: Deployment
metadata:
  name: trace
  namespace: apihub-system
  labels:
    app.kubernetes.io/name: trace
    app.kubernetes.io/part-of: apihub
spec:
  replicas: 2   # 只读、可水平扩展（prod 3）
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: trace
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trace
        app.kubernetes.io/part-of: apihub
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: /metrics
        checksum/config: "TODO-by-CI"
    spec:
      serviceAccountName: trace
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: app
          image: registry.apihub.internal/apihub/trace:0.1.0-dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8008
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: trace-config
            - secretRef:
                name: trace-secret
          resources:
            # trace 查询偶发并发（大盘 / 详情），CH 直查
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          readinessProbe:
            httpGet:
              path: /v1/trace/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/trace/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 3"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: trace
  namespace: apihub-system
spec:
  selector:
    app.kubernetes.io/name: trace
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trace
  namespace: apihub-system
