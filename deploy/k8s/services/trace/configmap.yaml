apiVersion: v1
kind: ConfigMap
metadata:
  name: trace-config
  namespace: apihub-system
  labels:
    app.kubernetes.io/name: trace
    app.kubernetes.io/part-of: apihub
data:
  APP_NAME: trace
  ENV: dev
  LOG_LEVEL: INFO

  PG_HOST: apihub-rds.internal
  PG_PORT: "5432"
  PG_DATABASE: apihub
  PG_POOL_MIN: "2"
  PG_POOL_MAX: "10"

  REDIS_HOST: apihub-redis.internal
  REDIS_PORT: "6379"

  # trace-svc 主要查 ClickHouse（api_call_log 表）
  CH_HOST: apihub-ch.internal
  CH_PORT: "8123"
  CH_USERNAME: apihub
  CH_DATABASE: apihub
  CH_POOL_SIZE: "10"

  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.apihub-monitoring:4317
  OTEL_SERVICE_NAME: trace
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev
---
apiVersion: v1
kind: Secret
metadata:
  name: trace-secret
  namespace: apihub-system
type: Opaque
# 用 Sealed Secrets 加密，这里仅占位
