apiVersion: v1
kind: ConfigMap
metadata:
  name: admin-config
  namespace: apihub-system
  labels:
    app.kubernetes.io/name: admin
    app.kubernetes.io/part-of: apihub
data:
  APP_NAME: admin
  ENV: dev
  LOG_LEVEL: INFO

  PG_HOST: apihub-rds.internal
  PG_PORT: "5432"
  PG_DATABASE: apihub
  PG_POOL_MIN: "5"
  PG_POOL_MAX: "20"

  REDIS_HOST: apihub-redis.internal
  REDIS_PORT: "6379"

  KAFKA_BROKERS: apihub-kafka-1:9092,apihub-kafka-2:9092,apihub-kafka-3:9092
  KAFKA_TOPIC_AUDIT_EVENTS: audit-events

  # admin-bff 通过 AggregatorClient 调下游 BFF
  TENANT_SVC_BASE_URL: http://tenant.apihub-system.svc.cluster.local
  AUTH_SVC_BASE_URL: http://auth.apihub-system.svc.cluster.local
  AGGREGATOR_TIMEOUT_SECONDS: "3"
  AGGREGATOR_MAX_CONNECTIONS: "50"

  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.apihub-monitoring:4317
  OTEL_SERVICE_NAME: admin
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev
---
apiVersion: v1
kind: Secret
metadata:
  name: admin-secret
  namespace: apihub-system
type: Opaque
# 用 Sealed Secrets 加密，这里仅占位
