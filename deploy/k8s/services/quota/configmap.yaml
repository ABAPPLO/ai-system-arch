apiVersion: v1
kind: ConfigMap
metadata:
  name: quota-config
  namespace: apihub-system
  labels:
    app.kubernetes.io/name: quota
    app.kubernetes.io/part-of: apihub
data:
  APP_NAME: quota
  ENV: dev
  LOG_LEVEL: INFO

  PG_HOST: apihub-rds.internal
  PG_PORT: "5432"
  PG_DATABASE: apihub
  PG_POOL_MIN: "5"
  PG_POOL_MAX: "20"

  # quota 是延迟敏感服务，连 Redis Cluster 用专用连接池
  REDIS_HOST: apihub-redis.internal
  REDIS_PORT: "6379"

  KAFKA_BROKERS: apihub-kafka-1:9092,apihub-kafka-2:9092,apihub-kafka-3:9092
  KAFKA_TOPIC_CALL_EVENTS: api-call-events

  # R3a：Go quota 信任入口鉴权（复用 R1d 模式，与 dispatcher/configmap.yaml 对齐）。
  # Go quota 的 ingressAuth 中间件验 X-Ingress-Auth == INGRESS_SHARED_SECRET；
  # APISIX proxy-rewrite 注入该 header。值须与 APISIX 一致；空 → fail-closed（全 401）。
  # 非敏（不像密码那样需要加密），入 ConfigMap；prod 走强随机（与 dispatcher 同策略）。
  INGRESS_SHARED_SECRET: ingress-shared-dev

  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.apihub-monitoring:4317
  OTEL_SERVICE_NAME: quota
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev
---
apiVersion: v1
kind: Secret
metadata:
  name: quota-secret
  namespace: apihub-system
type: Opaque
# 用 Sealed Secrets 加密，这里仅占位
