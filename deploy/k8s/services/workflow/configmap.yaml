# ⚠️ 这是 kustomize base（ARGO_MODE=stub）。kind/dev 经 overlays/kind/patches/workflow-argo-mode.yaml
# patch 成 k8s。禁止直接 kubectl apply -f 本文件（会 revert overlay → workflow 回 stub 模式）。
# 正确入口：make k8s-apply-kind。详见 deploy/k8s/services/README.md。
apiVersion: v1
kind: ConfigMap
metadata:
  name: workflow-config
  namespace: apihub-system
  labels:
    app.kubernetes.io/name: workflow
    app.kubernetes.io/part-of: apihub
data:
  APP_NAME: workflow
  ENV: dev
  LOG_LEVEL: INFO

  PG_HOST: apihub-rds.internal
  PG_PORT: "5432"
  PG_DATABASE: apihub
  PG_POOL_MIN: "2"
  PG_POOL_MAX: "10"

  REDIS_HOST: apihub-redis.internal
  REDIS_PORT: "6379"

  # Argo Workflow 模式：dev 用 stub，staging/prod 用 k8s
  ARGO_MODE: stub
  K8S_API_SERVER: https://kubernetes.default.svc
  ARGO_SERVER_URL: https://argo-server.argo:2746
  ARGO_SERVER_INSECURE: "false"   # prod 默认安全；dev 由 kind overlay 翻 true

  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.apihub-monitoring:4317
  OTEL_SERVICE_NAME: workflow
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev
---
apiVersion: v1
kind: Secret
metadata:
  name: workflow-secret
  namespace: apihub-system
type: Opaque
# 用 Sealed Secrets 加密，这里仅占位
