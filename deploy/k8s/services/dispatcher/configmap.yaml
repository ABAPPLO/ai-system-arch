apiVersion: v1
kind: ConfigMap
metadata:
  name: dispatcher-config
  namespace: apihub-system
  labels:
    app.kubernetes.io/name: dispatcher
    app.kubernetes.io/part-of: apihub
data:
  APP_NAME: dispatcher
  ENV: dev
  LOG_LEVEL: INFO

  PG_HOST: apihub-rds.internal
  PG_PORT: "5432"
  PG_DATABASE: apihub
  PG_POOL_MIN: "20"
  PG_POOL_MAX: "100"

  REDIS_HOST: apihub-redis.internal
  REDIS_PORT: "6379"

  KAFKA_BROKERS: apihub-kafka-1:9092,apihub-kafka-2:9092,apihub-kafka-3:9092
  KAFKA_TOPIC_CALL_EVENTS: api-call-events
  KAFKA_TOPIC_TASK_REQUESTS: task-requests
  KAFKA_TOPIC_AUDIT_EVENTS: audit-events

  # workflow-svc（dispatcher /v1/jobs 代理目标，文档 §4）
  WORKFLOW_SERVICE_URL: http://workflow.apihub-system

  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.apihub-monitoring:4317
  OTEL_SERVICE_NAME: dispatcher
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev
---
apiVersion: v1
kind: Secret
metadata:
  name: dispatcher-secret
  namespace: apihub-system
type: Opaque
# 用 Sealed Secrets 加密，这里仅占位
