apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcher
  namespace: apihub-system
  labels:
    app.kubernetes.io/name: dispatcher
    app.kubernetes.io/part-of: apihub
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: dispatcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dispatcher
        app.kubernetes.io/part-of: apihub
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: dispatcher
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: registry.apihub.internal/apihub/dispatcher:0.1.0-dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
            - name: metrics
              containerPort: 9090
          env:
            # R2e: HMAC envelope key —— dispatcher inbound 验签暖路径 in-process decrypt 用。
            # fail-closed：缺则 Pod 起不来。dev/kind 由 patches/apihub-hmac-key.yaml 注入；prod external-secrets。
            - name: HMAC_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: apihub-hmac-key
                  key: hmac_secret_key
          envFrom:
            - configMapRef:
                name: dispatcher-config
            - secretRef:
                name: dispatcher-secret
          resources:
            # dispatcher 是核心热点服务，资源给足
            requests:
              cpu: 1000m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 4Gi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          startupProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 5
            failureThreshold: 24   # 120s 窗口：startup 建 PG/Redis/Kafka/CH pool 偶遇 CoreDNS 解析时序，避免 liveness 过早 kill
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dispatcher
  namespace: apihub-system
spec:
  selector:
    app.kubernetes.io/name: dispatcher
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dispatcher
  namespace: apihub-system
