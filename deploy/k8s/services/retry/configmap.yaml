apiVersion: v1
kind: ConfigMap
metadata:
  name: retry-config
  namespace: apihub-system
  labels:
    app.kubernetes.io/name: retry
    app.kubernetes.io/part-of: apihub
data:
  APP_NAME: retry
  ENV: dev
  LOG_LEVEL: INFO

  PG_HOST: apihub-rds.internal
  PG_PORT: "5432"
  PG_DATABASE: apihub
  PG_POOL_MIN: "2"
  PG_POOL_MAX: "10"

  REDIS_HOST: apihub-redis.internal
  REDIS_PORT: "6379"

  KAFKA_BROKERS: apihub-kafka-bootstrap.apihub-system:9092
  KAFKA_TOPIC_TASK_FAILURES: task-failures
  KAFKA_CONSUMER_GROUP: retry

  # executor 内部 HTTP 接口（k8s 内网 DNS）
  EXECUTOR_HOST: executor.apihub-system.svc.cluster.local
  EXECUTOR_PORT: "8003"

  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.apihub-monitoring:4317
  OTEL_SERVICE_NAME: retry
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev
---
apiVersion: v1
kind: Secret
metadata:
  name: retry-secret
  namespace: apihub-system
type: Opaque
# 用 Sealed Secrets 加密，这里仅占位
