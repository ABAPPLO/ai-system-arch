apiVersion: v1
kind: ConfigMap
metadata:
  name: retry-config
  namespace: apihub-system
  labels:
    app.kubernetes.io/name: retry
    app.kubernetes.io/part-of: apihub
data:
  APP_NAME: retry
  ENV: dev
  LOG_LEVEL: INFO

  PG_HOST: apihub-rds.internal
  PG_PORT: "5432"
  PG_DATABASE: apihub
  PG_POOL_MIN: "2"
  PG_POOL_MAX: "10"

  REDIS_HOST: apihub-redis.internal
  REDIS_PORT: "6379"

  KAFKA_BROKERS: apihub-kafka-bootstrap.apihub-system:9092
  KAFKA_TOPIC_TASK_FAILURES: task-failures
  KAFKA_CONSUMER_GROUP: retry

  # executor 内部重试入口：走 executor Service:80（worker.py 读 executor_service_template）。
  # worker.py 默认模板含 {port} 且 main.py 默认 executor_port=8003，但 executor Service 只暴露 80
  # → 显式给出无 {port} 的 URL，.format(port=...) 即 no-op，避免误连 :8003 被 drop。
  # （见 phase2-findings「K8s 联调」retry→executor 条；kind overlay 同样设此值）
  EXECUTOR_SERVICE_TEMPLATE: "http://executor.apihub-system/v1/internal/retry"

  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.apihub-monitoring:4317
  OTEL_SERVICE_NAME: retry
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev
---
apiVersion: v1
kind: Secret
metadata:
  name: retry-secret
  namespace: apihub-system
type: Opaque
# 用 Sealed Secrets 加密，这里仅占位
