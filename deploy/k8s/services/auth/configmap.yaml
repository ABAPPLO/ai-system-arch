apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  namespace: apihub-system
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/part-of: apihub
data:
  APP_NAME: auth
  ENV: dev
  LOG_LEVEL: INFO

  PG_HOST: apihub-rds.internal
  PG_PORT: "5432"
  PG_DATABASE: apihub
  PG_POOL_MIN: "10"
  PG_POOL_MAX: "30"

  REDIS_HOST: apihub-redis.internal
  REDIS_PORT: "6379"

  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.apihub-monitoring:4317
  OTEL_SERVICE_NAME: auth
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-secret
  namespace: apihub-system
type: Opaque
# 用 Sealed Secrets 加密，这里仅占位
