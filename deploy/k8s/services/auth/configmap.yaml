apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  namespace: apihub-system
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/part-of: apihub
data:
  APP_NAME: auth
  ENV: dev
  LOG_LEVEL: INFO

  PG_HOST: apihub-rds.internal
  PG_PORT: "5432"
  PG_DATABASE: apihub
  PG_POOL_MIN: "10"
  PG_POOL_MAX: "30"

  REDIS_HOST: apihub-redis.internal
  REDIS_PORT: "6379"

  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.apihub-monitoring:4317
  OTEL_SERVICE_NAME: auth
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev

  # APISIX admin（auth 管 consumer 生命周期）+ 可信入口
  APISIX_ADMIN_URL: http://apisix-admin.apihub-ingress:9180
  INGRESS_SHARED_SECRET: ingress-shared-dev

  # auth 自验 caller 走 loopback（同 pod 127.0.0.1:8002），免集群 DNS 自调慢/超时
  # （否则 create_key 等带 APIKey 的 auth 端点中间件自调 auth.apihub-system → DNS 抖 ~37s → 503）。
  # /v1/apikey/verify 在 skip_auth_paths 里，无递归。
  AUTH_SERVICE_URL: http://127.0.0.1:8002/v1/apikey/verify
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-secret
  namespace: apihub-system
type: Opaque
# 用 Sealed Secrets 加密，这里仅占位
# stringData:
#   PG_PASSWORD: ...
#   APISIX_ADMIN_KEY: <from sealed secret>      # kind 用 edd1c9f034335f136f87ad84b625c8f1
#   INGRESS_SHARED_SECRET: <strong random>      # 与 api-registry 一致
