apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: apihub-system
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/part-of: apihub
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth
        app.kubernetes.io/part-of: apihub
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: auth
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: registry.apihub.internal/apihub/auth:0.1.0-dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8002
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: auth-config
            - secretRef:
                name: auth-secret
          resources:
            # auth 是 dispatcher 的强依赖，QPS 不高但 P99 必须低（缓存命中率 95%+）
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: apihub-system
spec:
  selector:
    app.kubernetes.io/name: auth
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth
  namespace: apihub-system
---
# /v1/apikey/verify 只允许集群内调用（dispatcher / api-registry / executor 等）
# 防止外部直接打这个内部端点
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-verify-internal-only
  namespace: apihub-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: auth
  policyTypes:
    - Ingress
  ingress:
    # /health/* 谁都能探
    - from:
        - namespaceSelector: {}
      ports:
        - port: http
          protocol: TCP
    # /v1/apikey/verify 只允许带 internal-service label 的 ns
    - from:
        - namespaceSelector:
            matchLabels:
              apihub.io/cluster-internal: "true"
      ports:
        - port: http
          protocol: TCP
