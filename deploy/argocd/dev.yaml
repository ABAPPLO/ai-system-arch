apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apihub-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:ABAPPLO/ai-system-arch.git
    targetRevision: main
    path: deploy/k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: apihub-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
