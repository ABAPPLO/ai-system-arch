apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apihub-prod-bj
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:ABAPPLO/ai-system-arch.git
    targetRevision: main
    path: deploy/k8s/overlays/prod-bj
  destination:
    name: bj-cluster  # 预先通过 argocd cluster add 注册 Bj ACK 集群
    # server: https://<bj-ack-cluster-api-server>  # 或者直接写 API Server URL（二选一）
    namespace: apihub-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
